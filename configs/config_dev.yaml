Name: FormulaGo
IsDemo: false  # true: demo mode, forbid operations like create, update, delete
IsProd: false
Host: 0.0.0.0
Port: 8191
Timeout: 30000

Captcha:
  KeyLong: 5
  ImgWidth: 240
  ImgHeight: 80

Auth:
  OAuthKey: change-me
  AccessSecret: change-me
  AccessExpire: 259200 # seconds, 3 days

Redis:
  Enable: false
  Host: 127.0.0.1
  Port: 6379
  Type: node
  Password: change-me
  DB: 0

Database:
  Type: mysql # mysql, postgres
  Host: 127.0.0.1
  Port: 3306
  DBName: formula_go
  Username: root # set your username
  Password: change-me # set your password from env DB_PASSWORD
  MaxOpenConn: 100
  SSLMode: false
  CacheTime: 5

Casbin:
  ModelText: |
    [request_definition]
    r = sub, obj, act
    [policy_definition]
    p = sub, obj, act
    [role_definition]
    g = _, _
    [policy_effect]
    e = some(where (p.eft == allow))
    [matchers]
    m = r.sub == p.sub && keyMatch2(r.obj,p.obj) && r.act == p.act

# Simple Storage Service
S3:
  Type: "AliyunOSS"
  AliyunOSS:
    Region: "cn-shenzhen"
    Endpoint:   "oss-cn-shenzhen.aliyuncs.com"
    BucketName: "change-me"
    BasePath: "change-me"
    SecretID: "change-me"
    SecretKey: "change-me"
    Domain: "oss.xxx.com"

# Wecom（企业微信）
Wecom:
  CorpId: "change-me"
  SecretId: "change-me"
  Token: "change-me"
  EncodingAESKey: "change-me"
